global:
  resolve_timeout: 5m
  smtp_smarthost: '${SMTP_HOST:-localhost:25}'
  smtp_from: '${SMTP_FROM:-alertmanager@example.com}'
  smtp_auth_username: '${SMTP_USER:-}'
  smtp_auth_password: '${SMTP_PASS:-}'
  smtp_require_tls: ${SMTP_TLS:-false}

# Templates
templates:
  - '/etc/alertmanager/*.tmpl'

# Route configuration
route:
  receiver: 'default'
  group_by: ['alertname', 'cluster', 'service']
  group_wait: 10s
  group_interval: 10s
  repeat_interval: 12h
  routes:
    # Critical alerts
    - match:
        severity: critical
      receiver: 'critical'
      group_wait: 10s
      repeat_interval: 5m

    # Warning alerts
    - match:
        severity: warning
      receiver: 'warning'
      group_wait: 30s
      repeat_interval: 1h

    # Info alerts
    - match:
        severity: info
      receiver: 'info'
      group_wait: 5m
      repeat_interval: 24h

# Inhibition rules
inhibit_rules:
  # Inhibit warning if critical is firing
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname', 'cluster', 'service']

  # Inhibit info if warning is firing
  - source_match:
      severity: 'warning'
    target_match:
      severity: 'info'
    equal: ['alertname', 'cluster', 'service']

# Receivers
receivers:
  - name: 'default'
    webhook_configs:
      - url: 'http://localhost:5001/alerts'
        send_resolved: true

  - name: 'critical'
    email_configs:
      - to: '${ALERT_EMAIL_CRITICAL:-admin@example.com}'
        headers:
          Subject: '[CRITICAL] Solr Alert: {{ .GroupLabels.alertname }}'
        html: |
          <h2>Critical Alert Fired</h2>
          <p><strong>Alert:</strong> {{ .GroupLabels.alertname }}</p>
          <p><strong>Service:</strong> {{ .GroupLabels.service }}</p>
          <p><strong>Severity:</strong> {{ .CommonLabels.severity }}</p>
          {{ range .Alerts }}
          <p><strong>Description:</strong> {{ .Annotations.description }}</p>
          <p><strong>Summary:</strong> {{ .Annotations.summary }}</p>
          {{ end }}
        send_resolved: true
    webhook_configs:
      - url: '${WEBHOOK_URL_CRITICAL:-}'
        send_resolved: true

  - name: 'warning'
    email_configs:
      - to: '${ALERT_EMAIL_WARNING:-admin@example.com}'
        headers:
          Subject: '[WARNING] Solr Alert: {{ .GroupLabels.alertname }}'
        send_resolved: true

  - name: 'info'
    webhook_configs:
      - url: '${WEBHOOK_URL_INFO:-}'
        send_resolved: true
